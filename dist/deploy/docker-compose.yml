# Agent Tools Kit — 生产环境 Docker Compose
# 直接从 GHCR 拉取镜像（无需本地构建）
# 前置条件：docker login ghcr.io

services:
  toolkit:
    image: ghcr.io/deerfish/df_ai_tools:latest
    container_name: agent_tools_kit
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TOOLKIT_DB=/app/data/toolkit.db
    restart: unless-stopped
