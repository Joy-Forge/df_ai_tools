# Agent Tools Kit — 生产环境 Docker Compose
# 直接从 GHCR 拉取镜像（无需本地构建）
# 前置条件：docker login ghcr.io

services:
  toolkit:
    image: {{REGISTRY}}/{{OWNER}}/{{REPO_NAME}}:{{IMAGE_TAG}}
    container_name: {{CONTAINER_NAME}}
    ports:
      - "{{HOST_PORT}}:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TOOLKIT_DB={{DB_PATH}}
    restart: unless-stopped
