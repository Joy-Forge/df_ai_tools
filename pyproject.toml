[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore::DeprecationWarning:fastapi.*",
]

[tool.coverage.run]
source = ["src"]
omit = [
    "*/tests/*",
    "src/mcp_entry.py",
]
branch = true

[tool.coverage.report]
show_missing = true
skip_covered = true
fail_under = 75
exclude_lines = [
    "if __name__ == .__main__.:",
    "except Exception:",
    "try:",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"
