name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "### 初始版本" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "### 变更 (${PREV_TAG} → ${{ github.ref_name }})" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Package deployment bundle
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="${{ github.ref_name }}"
          python scripts/deploy/generate-deploy.py --owner "${OWNER,,}" --tag "${TAG}"
          mkdir -p _release/agent-tools-kit-"${TAG}"
          cp -r dist/deploy/* _release/agent-tools-kit-"${TAG}"/
          cd _release
          tar czf agent-tools-kit-"${TAG}".tar.gz agent-tools-kit-"${TAG}"
          zip -r agent-tools-kit-"${TAG}".zip agent-tools-kit-"${TAG}"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Agent Tools Kit ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 📦 部署包

            下载 `agent-tools-kit-${{ github.ref_name }}.tar.gz` 或 `.zip`，
            解压后上传到服务器/NAS，运行 `./run.sh`（Linux）或 `.\run.ps1`（Windows）即可部署。

            ### 🐳 Docker 镜像

            镜像已自动推送到 ghcr.io：

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          files: |
            _release/agent-tools-kit-${{ github.ref_name }}.tar.gz
            _release/agent-tools-kit-${{ github.ref_name }}.zip
