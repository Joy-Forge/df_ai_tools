name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "### 初始版本" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "changelog<<EOF" >> $GITHUB_OUTPUT
            echo "### 变更 (${PREV_TAG} → ${{ github.ref_name }})" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD" --no-merges >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Agent Tools Kit ${{ github.ref_name }}

            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 🐳 Docker 镜像

            镜像已自动推送到 GHCR，可直接拉取运行：

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}

            # 或者通过 docker compose 运行
            # 1. 创建 docker-compose.yml：
            cat > docker-compose.yml << 'EOF'
            services:
              toolkit:
                image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
                container_name: agent_tools_kit
                ports:
                  - "8000:8000"
                volumes:
                  - ./data:/app/data
                environment:
                  - TOOLKIT_DB=/app/data/toolkit.db
                restart: unless-stopped
            EOF

            # 2. 启动
            docker compose up -d
            ```
